[build]
# Default to musl target for static linking
# Commented out to allow building without musl-gcc
# target = "x86_64-unknown-linux-musl"

[target.x86_64-unknown-linux-musl]
# Use rust-lld linker (no C compiler needed with pure Rust dependencies)
linker = "rust-lld"
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-unknown-linux-musl]
# ARM64 musl support (no C compiler needed with pure Rust dependencies)
linker = "rust-lld"
rustflags = ["-C", "target-feature=+crt-static"]
